name: AI APK Builder - Flutter Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Write local.properties
        run: |
          FLUTTER_PATH=$(dirname $(dirname $(which flutter)))
          echo "flutter.sdk=$FLUTTER_PATH" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          echo "--- local.properties ---"
          cat android/local.properties

      - name: Fix gradle.properties
        run: |
          PROPS="android/gradle.properties"
          sed -i '/^org\.gradle\.jvmargs/d' "$PROPS" 2>/dev/null || true
          sed -i '/^org\.gradle\.daemon/d' "$PROPS" 2>/dev/null || true
          echo 'org.gradle.jvmargs=-Xmx4g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8' >> "$PROPS"
          echo 'org.gradle.daemon=false' >> "$PROPS"
          echo 'android.useAndroidX=true' >> "$PROPS"
          echo 'android.enableJetifier=true' >> "$PROPS"
          cat "$PROPS"

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --android-skip-build-dependency-validation

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-apk-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
