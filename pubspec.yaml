name: ai_hub
description: "AI Hub - A unified AI ecosystem app"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2

  # Networking
  dio: ^5.4.3+1

  # UI
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.1
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  google_nav_bar: ^5.0.6
  shimmer: ^3.0.0

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  url_launcher: ^6.3.0
  flutter_animate: ^4.5.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true

